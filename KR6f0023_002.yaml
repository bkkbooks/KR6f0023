body:
  text: 西天譯經三藏朝奉大夫試光祿卿傳法大師賜紫沙門臣法護等奉詔譯復次長者菩薩摩訶薩觀察此身最初何因之所成立謂依父母精血合集生起彼因復由受其飲食食已變壞旋聚即散歸淡廕藏淡廕流潤終歸不淨然後火大增強煮變成熟後歸風力由其風力各分滓重及與流潤滓重所謂大小便等流潤謂血血變成肉肉成於脂脂成於骨骨成其髓髓成其精精等乃成此不淨身菩薩觀此不淨身故乃起思惟此身多種合集各別名相謂三百骨六十肪及膏相合四百膜五百肉團六百腦七百脈九百筋十六肋骨復有三事內纏其腸分生熟藏腸有十六交絡而住二千五百脈道透映一百七節八十萬俱胝毛孔具有五根九竅七藏不淨充滿髓有一掬腦有一掬脂有三掬淡廕六掬滓重六掬風力隨遍血有一斗如是一切各各充滿有七水脈而復圍繞吸諸滋味內火大增熾然燒煮逼切疲極身脈汗流是等諸相極難可見此之臭穢不淨體相是中云何起增上愛如求丐人得所用物得已旋棄又如大車負極重等唯諸智者於法覺了應如是知即説頌曰此身多種不淨聚愚無智者不了知強起增上愛著心如穢瓶破多穢氣耳目口鼻皆穢物彼等何者為香潔涎眵結聹及涕洟諸蟲雜惡何生愛譬如愚者取於炭勤力摩治欲令白炭盡力疲白莫成無智妄貪亦如是如人意欲成潔淨多種修治於此身百轉沐浴及香塗身壞命終歸不淨爾時世尊復告無畏授等五百長者言長者當知菩薩摩訶薩欲證阿耨多羅三藐三菩提者觀察此身有四十四相何等四十四謂菩薩摩訶薩觀察此身誠所厭棄菩薩觀身不可愛樂以不饒益故菩薩觀身極為臭穢膿血滿故菩薩觀身甚不堅牢終破壞故菩薩觀身體性羸劣筋骨相聯故菩薩觀身不淨穢惡常流故菩薩觀身如幻愚夫異生強起虛妄動亂相故菩薩觀身多所漏失以九竅門常流注故菩薩觀身熾然燒爇謂貪火所焚瞋火猛聚癡火暗冥故菩薩觀身貪瞋癡網常所蓋覆愛網相續故菩薩觀身竅穴所依以九竅門及諸毛孔周遍流注雜穢充故菩薩觀身多種逼惱四百四病常增損故菩薩觀身是為窟宅八萬四千戶蟲之所聚故菩薩觀身無常終歸死法故菩薩觀身無知於法不知故菩薩觀身如器用衆緣合成終破壞故菩薩觀身逼切衆多憂惱故菩薩觀身無歸趣畢竟老死故菩薩觀身深隱諂誑所行故菩薩觀身如地難平滿故菩薩觀身如火以所愛色隨繫著故菩薩觀身無厭足隨五欲故菩薩觀身破壞煩惱對礙故菩薩觀身無定分位以其利衰現所受故菩薩觀身無自他緣不得源流故菩薩觀身馳流心意以種種緣作意伺察故菩薩觀身棄背畢竟歸於棄尸林故菩薩觀身為他所食鷲鳥豺狼等食噉故菩薩觀身如輪盤影現筋骨連接故菩薩觀身無所顧惜殘棄漏失膿血滿故菩薩觀身耽著滋味飲食所成故菩薩觀身勤苦無利以是無常生滅法故菩薩觀身如惡友起諸邪妄故菩薩觀身如殺者重重現增苦故菩薩觀身為苦器三苦逼惱故所謂行苦壞苦苦苦菩薩觀身為苦聚五蘊隨轉無主宰故菩薩觀身極不自在種種緣成故菩薩觀身無壽者離男女相故菩薩觀身空寂諸蘊處界所合成故菩薩觀身虛假以如夢故菩薩觀身不實以如幻故菩薩觀身動亂如陽焰故菩薩觀身馳流如響應故菩薩觀身虛妄所起如影現故長者菩薩摩訶薩以如是等四十四相觀察於身而菩薩摩訶薩作此觀察時所有於身樂欲於身顧惜於身執我於身愛染於身積集於身繫著一切悉斷由是於命樂欲於命顧惜於命執我於命愛染於命積集於命繫著乃至舍宅妻子眷屬飲食衣服乘馭床座珍寶財穀香華燈塗一切受用樂具若樂欲若顧惜若執我所若愛染若積集若繫著一切亦斷由於身命能棄捨故乃至一切受用樂具亦悉棄捨如是乃能圓滿六波羅蜜多長者菩薩摩訶薩以能圓滿波羅蜜多故即能速證阿耨多羅三藐三菩提爾時世尊欲重宣此義即説頌曰應知人身極難得莫因此身造衆罪豺狗取食棄尸林空將此身為殘棄愚無智者常動亂虛偽身中起貪愛此身難馭違背深晝夜受苦無停息此身苦輪常生病此身不淨廣充盈飢渴隨逐嬈惱深誰諸智者生愛著此身如地廣無主及如惡友愚生愛因此身故衆罪興畢竟還自受諸苦此身不同金剛堅莫因此身廣造罪智者應修勝福因於佛教中生淨信此身不久徒存養衣服香嚴飲食資緣歸破壞暫任持邪勤施作何空過經百劫中難得遇大牟尼尊出世間速於佛教淨信生莫於惡趣受極怖假使壽千俱胝歲彼尚勿應生貪愛何況壽不滿百年豈生貪愛無厭足或有一類奢侈者不念此身極難得廣集嬉戲歌伎人於前戲劇求快樂廣集財寶何有樂護惜重重苦惱增下劣愚夫喜悅生智者於中離貪著富貴不實如夢幻愚者馳流於心意剎那破壞剎那成誰諸智者生貪愛
